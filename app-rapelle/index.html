<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Mon Agenda</title>
</head>
<body>

  <!-- PAGE ACCUEIL -->
  <div id="home" class="page">
    <header class="app-header">
      <div class="logo-container">
        <div class="logo-book">
          <div class="book-spine"></div>
          <div class="book-cover">
            <div class="book-lines"></div>
          </div>
          <div class="book-glow"></div>
        </div>
      </div>
      <h1 class="app-title">Mon Agenda</h1>
    </header>

    <button id="notif-btn" class="notif-btn">🔔 Activer les notifications</button>

    <div class="import-export-row">
      <button id="export-btn" class="export-btn">📤 Exporter</button>
      <label for="import-input" class="export-btn import-btn">📥 Importer</label>
      <input type="file" id="import-input" accept=".csv" style="display:none;" />
    </div>

    <div class="sections-grid">
      <div class="section-card" data-id="quotidien">
        <span class="card-icon">🏠</span>
        <span class="card-name">Vie quotidienne</span>
        <span class="card-count" id="count-quotidien">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="travail">
        <span class="card-icon">💼</span>
        <span class="card-name">Travail</span>
        <span class="card-count" id="count-travail">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="projets">
        <span class="card-icon">📋</span>
        <span class="card-name">Projets</span>
        <span class="card-count" id="count-projets">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="relations">
        <span class="card-icon">👥</span>
        <span class="card-name">Relations</span>
        <span class="card-count" id="count-relations">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="divers">
        <span class="card-icon">📦</span>
        <span class="card-name">Divers</span>
        <span class="card-count" id="count-divers">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="alire">
        <span class="card-icon">📖</span>
        <span class="card-name">À lire tous les jours</span>
        <span class="card-count" id="count-alire">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="sport">
        <span class="card-icon">🏋️</span>
        <span class="card-name">Sport</span>
        <span class="card-count" id="count-sport">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="formation">
        <span class="card-icon">🎓</span>
        <span class="card-name">Formation</span>
        <span class="card-count" id="count-formation">Aucun rappel</span>
      </div>
      <div class="section-card" data-id="zikr">
        <span class="card-icon">🤲</span>
        <span class="card-name">Zikr</span>
        <span class="card-count" id="count-zikr">Aucun rappel</span>
      </div>
    </div>
  </div>

  <!-- PAGE SECTION -->
  <div id="section-view" class="page hidden">
    <div class="section-view-header">
      <button id="back-btn" class="back-btn">← Retour</button>
      <h2 id="section-view-title"></h2>
    </div>
    <div id="rappels-list" class="rappels-list"></div>
  </div>

  <!-- MODAL DÉTAIL RAPPEL -->
  <div id="rappel-modal" class="rappel-modal hidden">
    <div class="rappel-modal-content">
      <button id="close-modal-btn" class="close-modal-btn">✕</button>
      <h3 id="modal-title"></h3>
      <p id="modal-date" class="modal-date"></p>
      <p id="modal-days" class="modal-days"></p>
      <p id="modal-description" class="modal-description"></p>
    </div>
  </div>

  <!-- MODAL AJOUT RAPPEL -->
  <div id="add-modal" class="rappel-modal hidden">
    <div class="rappel-modal-content">
      <button id="close-add-btn" class="close-modal-btn">✕</button>
      <h3>Nouveau rappel</h3>

      <label class="form-label">Section</label>
      <select id="add-section" class="form-input">
        <option value="quotidien">🏠 Vie quotidienne</option>
        <option value="travail">💼 Travail</option>
        <option value="projets">📋 Projets</option>
        <option value="relations">👥 Relations</option>
        <option value="divers">📦 Divers</option>
        <option value="alire">📖 À lire tous les jours</option>
        <option value="sport">🏋️ Sport</option>
        <option value="formation">🎓 Formation</option>
        <option value="zikr">🤲 Zikr</option>
      </select>

      <label class="form-label">Titre <span class="required">*</span></label>
      <input id="add-titre" type="text" class="form-input" placeholder="Ex : Appeler le médecin" />

      <label class="form-label">Description <span class="required">*</span></label>
      <textarea id="add-description" class="form-input" rows="3" placeholder="Détails du rappel..."></textarea>

      <label class="form-label">Date <span class="optional">(optionnel)</span></label>
      <div class="date-row">
        <input id="add-date" type="date" class="form-input" />
        <button type="button" id="clear-date-btn" class="clear-date-btn">✕</button>
      </div>

      <label class="form-label">Heure <span class="optional">(optionnel)</span></label>
      <div class="date-row">
        <input id="add-heure" type="time" class="form-input" />
        <button type="button" id="clear-heure-btn" class="clear-date-btn">✕</button>
      </div>

      <label class="form-label">Jours <span class="optional">(optionnel)</span></label>
      <div class="days-picker">
        <button type="button" class="day-btn" data-day="Lun">Lun</button>
        <button type="button" class="day-btn" data-day="Mar">Mar</button>
        <button type="button" class="day-btn" data-day="Mer">Mer</button>
        <button type="button" class="day-btn" data-day="Jeu">Jeu</button>
        <button type="button" class="day-btn" data-day="Ven">Ven</button>
        <button type="button" class="day-btn" data-day="Sam">Sam</button>
        <button type="button" class="day-btn" data-day="Dim">Dim</button>
      </div>

      <button type="button" id="save-rappel-btn" class="save-btn">✅ Enregistrer</button>
    </div>
  </div>

  <!-- BOUTON + FLOTTANT -->
  <button id="fab" class="fab">+</button>

  <script src="app.js"></script>
</body>
</html>
